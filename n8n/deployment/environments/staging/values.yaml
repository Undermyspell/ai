# Staging environment overrides
# Inherits from: environments/base/values.yaml

namespace: zumba-staging

n8n:
  resources:
    requests:
      cpu: 500m
      memory: 500Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  persistence:
    size: 2Gi
  
  env:
    N8N_SECURE_COOKIE: "false"

postgres:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  persistence:
    size: 2Gi
  
  # Enable external access on port 5433
  externalAccess:
    enabled: true
    port: 5433

evolutionApi:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  persistence:
    size: 1Gi

evolutionApiIngress:
  host: evolution-stage.pi.home

ingress:
  host: zumba-stage.pi.home

# whatsapp-bot aktivieren mit dem lokal in den k3s-containerd importierten Image.
# IfNotPresent + exakter Name -> k3s nutzt das lokale Image ohne Registry-Pull.
whatsappBot:
  enabled: true
  image:
    repository: zumba-whatsapp-bot
    tag: "0.1.3"
    pullPolicy: IfNotPresent
  weeklyReport:
    enabled: true

# admin-ui aktivieren (lokales Image; BOT_URL zeigt per ConfigMap auf den Bot).
adminUi:
  enabled: true
  image:
    repository: zumba-admin-ui
    tag: "0.1.3"
    pullPolicy: IfNotPresent
  ingress:
    host: zumba-admin-stage.pi.home
